# The quality gate: tests + typecheck (svelte-check + tsc).
#
# Runs in two contexts with ONE definition (so they can never drift):
#   - pull_request: every PR shows the gate before merge
#   - workflow_call: deploy.yml runs the same gate before building the prod image
#
# To make the gate BLOCK merges (not just report), require the "gate" status check in
# branch protection for main: repo Settings → Branches (or Rulesets) → require status
# checks → select "gate".
#
# Actions are pinned to commit SHAs (immutable; a moved tag can't ship code here).

name: ci

on:
  pull_request: {}
  workflow_call: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only — least privilege for the token
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        # version comes from devEngines.packageManager in package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc # pinned Node 26 — matches the native better-sqlite3 ABI
          cache: pnpm
      # onlyBuiltDependencies (pnpm-workspace.yaml) lets install compile better-sqlite3
      # + esbuild from source — needed before tests run. ubuntu-latest ships the toolchain.
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm check
